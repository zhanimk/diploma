# PostgreSQL Datasource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/judo_arena_db
spring.datasource.username=your_postgres_username
spring.datasource.password=your_postgres_password

# Hibernate Configuration
# 'update' will automatically update the database schema based on your entities
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in the console for debugging
spring.jpa.show-sql=true

# Specify the PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
